services:
  z-ui-migrator:
    build:
      context: ./z-ui
      dockerfile: dockerfile
      target: migrator
    image: z-ui-migrator
    container_name: z-ui-migrator
    command: ["bun", "run", "db:migrate"]
    env_file:
      - ./z-ui/.env
    networks:
      - caddy_net
    restart: "no"

  z-ui: 
    build:
      context: ./z-ui
      dockerfile: dockerfile
      target: runtime
      args:
        PUBLIC_WEBAPP_VERSION: ${PUBLIC_WEBAPP_VERSION:-dev-local}
        PUBLIC_WEBAPP_GIT_TAG: ${PUBLIC_WEBAPP_GIT_TAG:-}
        PUBLIC_WEBAPP_COMMIT_SHA: ${PUBLIC_WEBAPP_COMMIT_SHA:-}
        PUBLIC_WEBAPP_RELEASED_AT: ${PUBLIC_WEBAPP_RELEASED_AT:-}
    image: z-ui
    container_name: z-ui
    depends_on:
      z-ui-migrator:
        condition: service_completed_successfully
    ports:
      - "5173:3000"
    environment:
      - PUBLIC_ZDL_URL=http://z-dl:6126
      - PUBLIC_WEBAPP_VERSION=${PUBLIC_WEBAPP_VERSION:-dev-local}
      - PUBLIC_WEBAPP_GIT_TAG=${PUBLIC_WEBAPP_GIT_TAG:-}
      - PUBLIC_WEBAPP_COMMIT_SHA=${PUBLIC_WEBAPP_COMMIT_SHA:-}
      - PUBLIC_WEBAPP_RELEASED_AT=${PUBLIC_WEBAPP_RELEASED_AT:-}
    env_file:
      - ./z-ui/.env
    volumes:
      - ./koreaderPlugins/sake.koplugin:/app/koreaderPlugins/sake.koplugin:ro
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true
