name: Publish Prebuilt Docker Image

on:
  push:
    tags:
      - 'webapp/v*'

permissions:
  contents: read
  packages: write

jobs:
  publish-prebuilt-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          repository="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          version="${GITHUB_REF_NAME#webapp/v}"
          released_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "name=ghcr.io/${repository}"
            echo "version=${version}"
            echo "git_tag=${GITHUB_REF_NAME}"
            echo "released_at=${released_at}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.title=Sake
            org.opencontainers.image.description=Personal reading stack with a Svelte web app and KOReader plugin sync
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image.outputs.version }}
            type=raw,value=sha-${{ steps.image.outputs.short_sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./sake/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PUBLIC_WEBAPP_VERSION=${{ steps.image.outputs.version }}
            PUBLIC_WEBAPP_GIT_TAG=${{ steps.image.outputs.git_tag }}
            PUBLIC_WEBAPP_COMMIT_SHA=${{ github.sha }}
            PUBLIC_WEBAPP_RELEASED_AT=${{ steps.image.outputs.released_at }}
